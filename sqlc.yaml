version: "2"
sql:
  - engine: postgresql
    schema:
      - sql/migrations/0001_initial_schema.sql
      - sql/migrations/0002_ticket_transition_event_types.sql
      - sql/migrations/0003_full_text_search.sql
    queries:
      - sql/queries
    gen:
      go:
        package: db
        out: internal/db
        sql_package: pgx/v5
        emit_db_tags: true
        emit_json_tags: true
        emit_empty_slices: true
