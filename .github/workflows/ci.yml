name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: ./scripts/verify.sh
        env:
          FORGE_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_test?sslmode=disable
  browser:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: oven-sh/setup-bun@v2
      - name: Prepare browser database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres forge_browser
          go run ./cmd/forge migrate
        env:
          FORGE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_browser?sslmode=disable
      - run: bun install --frozen-lockfile
        working-directory: ui-tests
      - run: bunx playwright install --with-deps chromium
        working-directory: ui-tests
      - run: bun run test
        working-directory: ui-tests
        env:
          FORGE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/forge_browser?sslmode=disable
          FORGE_ADMIN_TOKEN: browser-test-token
          FORGE_ARTIFACT_ROOT: ${{ runner.temp }}/forge-artifacts
